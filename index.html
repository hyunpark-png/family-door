<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리집 현관지기</title>
    
    <link class="apple-touch-icon" href="https://img.icons8.com/fluent/192/home.png">
    <link class="shortcut icon" href="https://img.icons8.com/fluent/192/home.png">
    
    <meta name="theme-color" content="#f8fafc">
    <meta name="apple-mobile-web-app-status-bar-style" content="#f8fafc">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        canvas { background: linear-gradient(to bottom, #0f172a, #1e293b); display: block; margin: 0 auto; border-radius: 12px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col items-center p-4 pb-12">

    <main class="w-full max-w-md bg-white rounded-2xl shadow-xl p-6 mt-4 space-y-8">
        
        <header class="text-center border-b border-slate-100 pb-4">
            <h1 class="text-2xl font-bold text-slate-950 flex justify-center items-center gap-2">🏠 우리집 현관지기</h1>
            <p class="text-sm text-slate-500 mt-1">실시간 가족 아지트 & 현관문 관리</p>
        </header>

        <section id="section-home">
            <div id="lock-warning" class="mb-4 p-4 rounded-xl text-center font-semibold transition-all duration-300">
                데이터를 불러오는 중...
            </div>
            <div id="family-list" class="space-y-4"></div>
            <input type="file" id="profile-file-input" accept="image/*" class="hidden" onchange="uploadProfileImage(this)">
        </section>

        <hr class="border-slate-100">

        <section id="section-gallery" class="space-y-4">
            <div class="flex items-center justify-between border-b border-slate-100 pb-2">
                <h2 class="text-lg font-bold text-slate-900 flex items-center gap-1.5">📸 오늘의 데일리 사진첩</h2>
                <span class="text-xs font-semibold bg-amber-100 text-amber-800 px-2 py-0.5 rounded-full">최대 16장 한정</span>
            </div>
            
            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 text-xs space-y-3">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="gallery-user" placeholder="올리는 사람 이름" class="p-2.5 border border-slate-300 rounded-lg bg-white font-medium focus:outline-none focus:border-indigo-500">
                    <label class="flex items-center justify-center bg-white border border-slate-300 text-slate-700 font-bold py-2 px-3 rounded-lg cursor-pointer hover:bg-slate-100 transition-colors text-center">
                        📁 사진 선택하기
                        <input type="file" id="gallery-file" accept="image/*" class="hidden" onchange="displayFileName(this)">
                    </label>
                </div>
                <div id="file-name-display" class="text-[11px] text-indigo-600 font-semibold px-1 hidden truncate">선택된 사진: 없음</div>
                <div class="flex gap-2">
                    <input type="text" id="gallery-memo" placeholder="사진에 들어갈 설명을 적어주세요." class="w-full p-2.5 border border-slate-300 rounded-lg bg-white focus:outline-none focus:border-indigo-500">
                    <button onclick="uploadPhoto()" id="upload-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-5 rounded-lg shrink-0 transition-colors">등록 완료</button>
                </div>
            </div>

            <div id="photo-grid" class="grid grid-cols-4 gap-2"></div>
        </section>

        <hr class="border-slate-100">

        <section id="section-game" class="space-y-4">
            <div class="border-b border-slate-100 pb-2">
                <h2 class="text-lg font-bold text-slate-900 flex items-center gap-1.5">🎮 우리집 미니 오락실</h2>
                <p class="text-xs text-slate-500 mt-0.5">하늘에서 우수수 떨어지는 거대한 돌을 피하세요!</p>
            </div>

            <div class="bg-slate-950 text-white p-3 rounded-xl shadow-inner">
                <h3 class="text-xs font-bold text-amber-400 mb-2 text-center flex justify-center items-center gap-1">🏆 오늘의 돌 피하기 TOP 3</h3>
                <ol id="game-ranking" class="text-xs space-y-1.5 text-center font-medium">
                    <li class="text-slate-500">랭킹 데이터를 불러오고 있습니다...</li>
                </ol>
            </div>

            <div class="relative overflow-hidden rounded-xl shadow-md border border-slate-200">
                <canvas id="gameCanvas" width="320" height="240"></canvas>
                
                <div id="game-start-screen" class="absolute inset-0 flex flex-col items-center justify-center bg-white/95 transition-opacity duration-300 p-4">
                    <p class="text-xs font-bold text-indigo-600 mb-3 text-center">🏃‍♂️ 이름을 입력하고 게임을 시작해 주세요!</p>
                    <input type="text" id="player-name" placeholder="여기에 이름 입력 (ex. 아빠)" class="mb-4 p-2.5 rounded-xl text-sm text-slate-900 bg-slate-50 text-center w-48 font-bold border-2 border-slate-200 focus:outline-none focus:border-indigo-500 shadow-sm">
                    <button onclick="startGame()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-8 py-3 rounded-xl text-sm shadow-md transform active:scale-95 transition-all">게임 시작 🚀</button>
                </div>
            </div>

            <div class="flex justify-center gap-6 pt-1">
                <button onmousedown="moveLeft(true)" onmouseup="moveLeft(false)" ontouchstart="moveLeft(true)" ontouchend="moveLeft(false)" class="w-20 py-3.5 bg-slate-100 hover:bg-slate-200 active:bg-slate-300 font-bold rounded-xl text-xl select-none shadow-sm border border-slate-200 text-slate-700">◀</button>
                <button onmousedown="moveRight(true)" onmouseup="moveRight(false)" ontouchstart="moveRight(true)" ontouchend="moveRight(false)" class="w-20 py-3.5 bg-slate-100 hover:bg-slate-200 active:bg-slate-300 font-bold rounded-xl text-xl select-none shadow-sm border border-slate-200 text-slate-700">▶</button>
            </div>
        </section>

    </main>

    <div id="photo-modal" class="fixed inset-0 bg-black/90 z-50 flex flex-col items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity duration-300" onclick="closePhotoModal()">
        <img id="modal-img" src="" alt="확대사진" class="max-w-full max-h-[70vh] rounded-xl object-contain shadow-2xl">
        <div class="text-white text-center mt-4 space-y-1 max-w-sm px-4">
            <p id="modal-memo" class="font-bold text-base break-words"></p>
            <p id="modal-uploader" class="text-xs text-slate-400"></p>
        </div>
        <button class="absolute top-4 right-4 text-white bg-white/20 hover:bg-white/30 text-xl font-bold w-10 h-10 rounded-full flex items-center justify-center">✕</button>
    </div>

    <script>
        const SUPABASE_URL = 'https://vxpumumartgzzzuefgwx.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_Xilja7NtXXrLZnJ8zVnzjw_fEdNJOCa';
        
        const mySupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let familyData = [];
        let photoData = [];
        let currentTargetMemberId = null;

        // ==========================================
        // [데이터 동기화 및 패치 로직]
        // ==========================================
        async function fetchFamilyStatus() {
            const { data, error } = await mySupabase.from('family_status').select('*').order('id');
            if (!error && data) {
                familyData = data;
                renderApplication();
            }
        }

        async function fetchPhotos() {
            const todayStr = new Date().toISOString().split('T')[0];
            const { data, error } = await mySupabase
                .from('family_gallery')
                .select('*')
                .gte('created_at', todayStr + 'T00:00:00')
                .order('id', { ascending: false })
                .limit(16);

            if (!error && data) {
                photoData = data;
                renderGallery();
            }
        }

        async function fetchRankings() {
            const todayStr = new Date().toISOString().split('T')[0];
            const { data, error } = await mySupabase
                .from('game_ranking')
                .select('*')
                .gte('created_at', todayStr + 'T00:00:00')
                .order('score', { ascending: false })
                .limit(3);

            if (!error && data) {
                const rankingList = document.getElementById('game-ranking');
                rankingList.innerHTML = '';
                if(data.length === 0) {
                    rankingList.innerHTML = `<li class="text-slate-500 py-1">오늘의 첫 돌 피하기 장인에 도전하세요!</li>`;
                    return;
                }
                data.forEach((rank, index) => {
                    const medals = ['🥇', '🥈', '🥉'];
                    rankingList.innerHTML += `<li class="text-slate-300">${medals[index]} <span class="font-bold text-white">${rank.player_name}</span> : <span class="text-emerald-400 font-bold">${rank.score}점</span></li>`;
                });
            }
        }

        // ==========================================
        // [UI 화면 그리기 함수]
        // ==========================================
        function renderApplication() {
            const listContainer = document.getElementById('family-list');
            listContainer.innerHTML = '';

            let outCount = 0;
            let lastHomeMember = null;
            let maxTime = 0;

            familyData.forEach(member => {
                if (member.status === 'out') outCount++;
                
                if (member.status === 'home' && member.created_at) {
                    const timeValue = new Date(member.created_at).getTime();
                    if (timeValue > maxTime) {
                        maxTime = timeValue;
                        lastHomeMember = member;
                    }
                }

                const profileImg = member.profile_url || `https://api.dicebear.com/7.x/adventurer/svg?seed=${encodeURIComponent(member.name)}`;

                const card = document.createElement('div');
                card.className = `flex flex-col p-4 rounded-xl border transition-all ${
                    member.status === 'home' ? 'bg-emerald-50/40 border-emerald-200' : 
                    member.status === 'trip' ? 'bg-amber-50/40 border-amber-200' : 'bg-white border-slate-200'
                }`;

                card.innerHTML = `
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-2.5">
                            <div class="relative group cursor-pointer" onclick="triggerProfileUpload(${member.id})">
                                <img src="${profileImg}" alt="프로필" class="w-12 h-12 rounded-full bg-slate-100 border border-slate-200 object-cover">
                                <span class="absolute -bottom-1 -right-1 bg-slate-800 text-white text-[9px] px-1 py-0.5 rounded-md font-bold scale-90">⚙️ 변경</span>
                            </div>
                            <span class="font-bold text-lg text-slate-800">${member.name}</span>
                        </div>
                        <div class="flex gap-1 bg-slate-100 p-1 rounded-lg">
                            <button onclick="updateStatus(${member.id}, 'home')" class="px-3 py-1.5 rounded-md text-xs font-bold transition-all ${member.status === 'home' ? 'bg-emerald-500 text-white shadow-sm' : 'text-slate-500 hover:bg-slate-200'}">들어옴</button>
                            <button onclick="updateStatus(${member.id}, 'out')" class="px-3 py-1.5 rounded-md text-xs font-bold transition-all ${member.status === 'out' ? 'bg-slate-600 text-white shadow-sm' : 'text-slate-500 hover:bg-slate-200'}">나감</button>
                            <button onclick="updateStatus(${member.id}, 'trip')" class="px-3 py-1.5 rounded-md text-xs font-bold transition-all ${member.status === 'trip' ? 'bg-amber-500 text-white shadow-sm' : 'text-slate-500 hover:bg-slate-200'}">외박</button>
                        </div>
                    </div>
                    <div class="mt-3 flex gap-2 items-center">
                        <input type="text" id="memo-${member.id}" value="${member.memo || ''}" placeholder="여기에 메모 입력..." 
                            class="w-full text-xs bg-slate-50 border border-slate-200 rounded-md px-2 py-1 focus:outline-none focus:border-slate-400 text-slate-600"
                            onchange="updateMemo(${member.id}, this.value)">
                    </div>
                `;
                listContainer.appendChild(card);
            });

            const warningBox = document.getElementById('lock-warning');
            if (outCount > 0) {
                warningBox.className = "mb-6 p-4 rounded-xl text-center font-semibold bg-blue-50 text-blue-700 border border-blue-100";
                warningBox.innerHTML = `현재 밖에 <span class="text-xl font-bold">${outCount}</span>명 있어요.`;
            } else {
                if (lastHomeMember) {
                    warningBox.className = "mb-6 p-4 rounded-xl text-center font-semibold bg-emerald-50 text-emerald-700 border border-emerald-100";
                    warningBox.innerHTML = `🎉 모두 복귀 완료! <br><span class="text-xl font-bold">[${lastHomeMember.name}]</span>님이 문을 잠가주세요!`;
                } else {
                    warningBox.className = "mb-6 p-4 rounded-xl text-center font-semibold bg-slate-100 text-slate-600 border border-slate-200";
                    warningBox.innerHTML = "모두 내부에 있거나 외박 중입니다.";
                }
            }
        }

        function renderGallery() {
            const grid = document.getElementById('photo-grid');
            grid.innerHTML = '';

            if(photoData.length === 0) {
                grid.innerHTML = `<p class="col-span-4 text-center text-xs text-slate-400 py-10 bg-slate-50 rounded-xl border border-dashed border-slate-200">오늘 사진이 없습니다.<br>폰에서 4장씩 채워보세요!</p>`;
                return;
            }

            photoData.forEach(photo => {
                const item = document.createElement('div');
                item.className = "relative bg-slate-100 rounded-lg overflow-hidden shadow-sm aspect-square border border-slate-200 cursor-pointer hover:scale-95 transition-transform";
                const fullImageUrl = mySupabase.storage.from('gallery').getPublicUrl(photo.url).data.publicUrl;

                item.innerHTML = `
                    <img src="${fullImageUrl}" alt="가족일상" class="w-full h-full object-cover" onclick="openPhotoModal('${fullImageUrl}', '${photo.memo.replace(/'/g, "\\'")}', '${photo.uploader}')">
                    <div class="absolute inset-x-0 bottom-0 bg-gradient-to-t from-black/80 to-transparent p-1 pointer-events-none">
                        <p class="text-[9px] text-white text-center font-bold truncate">👤 ${photo.uploader}</p>
                    </div>
                `;
                grid.appendChild(item);
            });
        }

        function openPhotoModal(url, memo, uploader) {
            document.getElementById('modal-img').src = url;
            document.getElementById('modal-memo').innerText = memo || '말머리 없음';
            document.getElementById('modal-uploader').innerText = `👤 공유자: ${uploader}`;
            
            const modal = document.getElementById('photo-modal');
            modal.classList.remove('opacity-0', 'pointer-events-none');
        }

        function closePhotoModal() {
            const modal = document.getElementById('photo-modal');
            modal.classList.add('opacity-0', 'pointer-events-none');
        }

        function displayFileName(input) {
            const display = document.getElementById('file-name-display');
            if(input.files && input.files[0]) {
                display.innerText = `선택된 사진: ${input.files[0].name}`;
                display.classList.remove('hidden');
            }
        }

        // ==========================================
        // [데이터 쓰기 및 업로드 처리]
        // ==========================================
        async function updateStatus(id, newStatus) {
            await mySupabase.from('family_status').update({ status: newStatus, created_at: new Date() }).eq('id', id);
        }

        async function updateMemo(id, newMemo) {
            await mySupabase.from('family_status').update({ memo: newMemo }).eq('id', id);
        }

        function triggerProfileUpload(memberId) {
            currentTargetMemberId = memberId;
            document.getElementById('profile-file-input').click();
        }

        async function uploadProfileImage(input) {
        if (!input.files || !input.files[0] || !currentTargetMemberId) return;
            const file = input.files[0];
            const fileExt = file.name.split('.').pop();
            const fileName = `profile_${currentTargetMemberId}_${Date.now()}.${fileExt}`;

            const { error: uploadError } = await mySupabase.storage.from('gallery').upload(fileName, file);
            if (uploadError) return alert('이미지 업로드 실패: ' + uploadError.message);

            const publicUrl = mySupabase.storage.from('gallery').getPublicUrl(fileName).data.publicUrl;
            
            // 실시간 반영 타이밍 보완 버그 수정
            fetchFamilyStatus(); 

            await mySupabase.from('family_status').update({ profile_url: publicUrl }).eq('id', currentTargetMemberId);
            
            input.value = '';
            
            // 0.5초 뒤에 서버 데이터를 한 번 더 확실하게 새로고침
            setTimeout(() => {
                fetchFamilyStatus();
            }, 500);   
        }

        async function uploadPhoto() {
            const uploader = document.getElementById('gallery-user').value.trim();
            const memo = document.getElementById('gallery-memo').value.trim();
            const fileInput = document.getElementById('gallery-file');

            if (!uploader) return alert('이름을 작성해주세요.');
            if (!fileInput.files || !fileInput.files[0]) return alert('갤러리에서 공유할 사진을 골라주세요!');
            if (photoData.length >= 16) return alert('오늘은 이미 16장의 사진이 다 찼습니다!');

            const btn = document.getElementById('upload-btn');
            btn.innerText = "업로드 중...";
            btn.disabled = true;

            const file = fileInput.files[0];
            const fileExt = file.name.split('.').pop();
            const fileName = `daily_${Date.now()}.${fileExt}`;

            const { error: storageError } = await mySupabase.storage.from('gallery').upload(fileName, file);
            
            if(!storageError) {
                const { error: dbError } = await mySupabase.from('family_gallery').insert([{ uploader, url: fileName, memo, created_at: new Date() }]);
                if(!dbError) {
                    fileInput.value = '';
                    document.getElementById('gallery-memo').value = '';
                    document.getElementById('file-name-display').classList.add('hidden');
                    fetchPhotos();
                }
            } else {
                alert('업로드 오류: 수파베이스 버킷을 확인하세요.');
            }
            btn.innerText = "등록 완료";
            btn.disabled = false;
        }

        // ==========================================
        // [게임 엔진: "돌 피하기"]
        // ==========================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gameInterval, score, playerX, playerSpeed = 5.5, stones = [], isPlaying = false;
        let moveL = false, moveR = false;

        function startGame() {
            const name = document.getElementById('player-name').value.trim();
            
            // [수정 포인트] 필수 이름 입력 검증 가드 문구 강화
            if(!name) {
                alert('이름을 입력하세요! 이름을 적어주셔야 명예의 전당 랭킹에 등록됩니다.');
                return;
            }
            
            document.getElementById('game-start-screen').classList.add('opacity-0', 'pointer-events-none');
            isPlaying = true; score = 0; playerX = canvas.width / 2 - 12; stones = [];
            
            if(gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(updateGameLoop, 20);
        }

        function updateGameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (moveL && playerX > 0) playerX -= playerSpeed;
            if (moveR && playerX < canvas.width - 24) playerX += playerSpeed;

            // 캐릭터 그리기 (UFO 비행선 형태)
            ctx.fillStyle = '#38bdf8';
            ctx.beginPath(); ctx.arc(playerX + 12, canvas.height - 20, 10, 0, Math.PI, true); ctx.fill(); 
            ctx.fillStyle = '#0ea5e9';
            ctx.fillRect(playerX, canvas.height - 20, 24, 6); 
            ctx.fillStyle = '#fbbf24'; 
            ctx.beginPath(); ctx.arc(playerX + 12, canvas.height - 32, 3, 0, Math.PI * 2); ctx.fill();

            // 돌맹이 생성
            if (Math.random() < 0.08) {
                stones.push({ 
                    x: Math.random() * (canvas.width - 20), 
                    y: -20, 
                    radius: 9 + Math.random() * 11, 
                    speed: 3.5 + Math.random() * 4.5,
                    jaggedSeed: Math.random() * 10
                });
            }

            for (let i = stones.length - 1; i >= 0; i--) {
                stones[i].y += stones[i].speed;
                
                // 돌맹이 디자인 그리기
                ctx.fillStyle = '#64748b'; 
                ctx.beginPath();
                const points = 8; 
                for (let j = 0; j < points; j++) {
                    const angle = (j / points) * Math.PI * 2;
                    const offset = (j % 2 === 0 ? 3 : -2) * Math.sin(stones[i].jaggedSeed + j);
                    const r = stones[i].radius + offset;
                    const px = stones[i].x + Math.cos(angle) * r;
                    const py = stones[i].y + Math.sin(angle) * r;
                    if (j === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
                }
                ctx.closePath(); ctx.fill();

                ctx.fillStyle = '#475569';
                ctx.beginPath(); ctx.arc(stones[i].x - 2, stones[i].y - 2, stones[i].radius * 0.4, 0, Math.PI * 2); ctx.fill();

                // 충돌 검사
                const distX = Math.abs(stones[i].x - (playerX + 12));
                const distY = Math.abs(stones[i].y - (canvas.height - 20));
                if (distX < (stones[i].radius + 10) && distY < (stones[i].radius + 8)) {
                    endGameRoutine();
                    return;
                }

                if (stones[i].y > canvas.height + 20) { stones.splice(i, 1); score++; }
            }

            ctx.fillStyle = '#f8fafc'; ctx.font = 'bold 13px Courier New'; ctx.fillText(`SCORE: ${score.toString().padStart(4, '0')}`, 15, 25);
        }

        async function endGameRoutine() {
            isPlaying = false;
            clearInterval(gameInterval);
            alert(`🪨 거대한 돌에 정면 충돌했습니다! \n나의 기록: ${score}점`);
            
            const name = document.getElementById('player-name').value.trim();
            await mySupabase.from('game_ranking').insert([{ player_name: name, score: score, created_at: new Date() }]);
            
            document.getElementById('game-start-screen').classList.remove('opacity-0', 'pointer-events-none');
            fetchRankings();
        }

        function moveLeft(bool) { moveL = bool; }
        function moveRight(bool) { moveR = bool; }

        document.addEventListener('keydown', (e) => {
            if(e.key === 'ArrowLeft') moveL = true;
            if(e.key === 'ArrowRight') moveR = true;
        });
        document.addEventListener('keyup', (e) => {
            if(e.key === 'ArrowLeft') moveL = false;
            if(e.key === 'ArrowRight') moveR = false;
        });

        // ==========================================
        // [실시간 리스너 및 부팅 파이프라인]
        // ==========================================
        mySupabase.channel('schema-db-changes').on('postgres_changes', { event: '*', schema: 'public', table: 'family_status' }, () => { fetchFamilyStatus(); }).subscribe();
        mySupabase.channel('gallery-changes').on('postgres_changes', { event: '*', schema: 'public', table: 'family_gallery' }, () => { fetchPhotos(); }).subscribe();

        fetchRankings();
